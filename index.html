<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estructurador de Proyectos IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Open Sans', sans-serif; background-color: #f8fafc; }
        h1, h2, h3, h4 { font-family: 'Montserrat', sans-serif; }
        .ai-glow { animation: glow 2s infinite alternate; }
        @keyframes glow {
            from { box-shadow: 0 0 10px rgba(99, 102, 241, 0.3); }
            to { box-shadow: 0 0 20px rgba(99, 102, 241, 0.6), 0 0 10px rgba(56, 189, 248, 0.4); }
        }
        .prose blockquote { border-left: 4px solid #eab308; background-color: #fefce8; padding: 1rem; border-radius: 0 0.5rem 0.5rem 0; font-style: normal; color: #854d0e; margin: 1.5rem 0; }
        .dark-scroll::-webkit-scrollbar { width: 6px; }
        .dark-scroll::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        .hidden { display: none !important; }
        #pdf-content { padding: 20px; background: white; }
    </style>
</head>
<body class="p-4 md:p-8 text-slate-700">

    <header class="max-w-7xl mx-auto mb-10 text-center pt-4">
        <div class="inline-block bg-blue-100 text-blue-800 px-4 py-1.5 rounded-full text-sm font-bold tracking-wider mb-4 border border-blue-200 uppercase">
            Especialización en Gerencia de Proyectos
        </div>
        <h1 class="text-4xl md:text-5xl font-extrabold text-slate-900 tracking-tight mb-4">Estructurador IA</h1>
        <p class="text-xl text-slate-500 max-w-3xl mx-auto">Generación de documentación técnica y estratégica.</p>
    </header>

    <section class="max-w-7xl mx-auto mb-16">
        <div class="bg-gradient-to-r from-blue-900 to-indigo-900 text-white rounded-[2rem] p-1 shadow-2xl ai-glow">
            <div class="bg-slate-900/90 backdrop-blur-md rounded-[1.8rem] p-6 md:p-8">
                <div class="flex flex-col xl:flex-row gap-8 items-stretch">
                    
                    <div class="w-full xl:w-5/12 flex flex-col justify-start">
                        <div class="flex border-b border-slate-700 mb-4">
                            <button onclick="switchTab('simple')" id="tab-simple" class="flex-1 py-2 text-sm font-bold border-b-2 border-blue-500 text-blue-400">Modo Rápido</button>
                            <button onclick="switchTab('form')" id="tab-form" class="flex-1 py-2 text-sm font-bold border-b-2 border-transparent text-slate-400">Estructurado</button>
                        </div>

                        <div id="content-simple" class="mb-6">
                            <textarea id="projectInput" rows="6" class="w-full bg-slate-800 border border-slate-600 rounded-xl p-4 text-white focus:ring-2 focus:ring-blue-500 resize-none dark-scroll" placeholder="Describe tu idea detalladamente..."></textarea>
                        </div>

                        <div id="content-form" class="mb-6 hidden space-y-4 max-h-[350px] overflow-y-auto pr-2 dark-scroll">
                            <input type="text" id="f_nombre" class="w-full bg-slate-800 border border-slate-600 rounded-lg p-3 text-white" placeholder="Nombre del Proyecto">
                            <input type="text" id="f_sector" class="w-full bg-slate-800 border border-slate-600 rounded-lg p-3 text-white" placeholder="Sector">
                            <textarea id="f_logistica" rows="2" class="w-full bg-slate-800 border border-slate-600 rounded-lg p-3 text-white" placeholder="Retos clave..."></textarea>
                        </div>

                        <div class="space-y-3 mt-auto">
                            <button onclick="callGemini('detailed')" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 rounded-xl transition flex justify-center items-center gap-2">
                                <i class="fas fa-microscope"></i> Ruta de los 5 Estudios
                            </button>
                            <div class="grid grid-cols-2 gap-3">
                                <button onclick="callGemini('pestel')" class="bg-slate-700 hover:bg-slate-600 text-white py-2 rounded-xl text-xs font-bold">PESTEL</button>
                                <button onclick="callGemini('porter')" class="bg-slate-700 hover:bg-slate-600 text-white py-2 rounded-xl text-xs font-bold">PORTER</button>
                                <button onclick="callGemini('risks')" class="bg-slate-700 hover:bg-slate-600 text-white py-2 rounded-xl text-xs font-bold">RIESGOS</button>
                                <button onclick="callGemini('pitch')" class="bg-slate-700 hover:bg-slate-600 text-white py-2 rounded-xl text-xs font-bold">PITCH</button>
                            </div>
                        </div>
                    </div>

                    <div class="w-full xl:w-7/12 flex flex-col">
                        <div id="outputHeader" class="bg-slate-800 rounded-t-xl px-6 py-3 border-b border-slate-700 hidden items-center justify-between text-white font-bold">
                            <span id="outputTitle">Resultados</span>
                            <div class="flex gap-4">
                                <button onclick="copyToClipboard()" title="Copiar Texto"><i class="far fa-copy hover:text-blue-400"></i></button>
                                <button onclick="downloadPDF()" title="Descargar PDF"><i class="fas fa-file-pdf hover:text-red-400"></i></button>
                            </div>
                        </div>
                        
                        <div class="flex-grow bg-white rounded-b-xl border-4 border-slate-800 p-6 md:p-8 relative min-h-[500px] max-h-[600px] overflow-y-auto">
                            <div id="initialState" class="absolute inset-0 flex flex-col items-center justify-center text-slate-400 text-center p-8 bg-slate-50">
                                <i class="fas fa-rocket text-5xl mb-4"></i>
                                <p>Ingresa los datos para comenzar el análisis.</p>
                            </div>
                            <div id="loadingState" class="hidden absolute inset-0 flex flex-col items-center justify-center bg-white/90 z-10 backdrop-blur-sm">
                                <div class="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                            </div>
                            <div id="resultContent" class="hidden prose max-w-none prose-slate"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        const API_KEY = "AIzaSyCs4onHVK7pRQKiwS12mv8oRBxVigug_44";
        const ENDPOINT = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
        let activeTab = 'simple';

        function switchTab(tab) {
            activeTab = tab;
            document.getElementById('content-simple').classList.toggle('hidden', tab !== 'simple');
            document.getElementById('content-form').classList.toggle('hidden', tab !== 'form');
        }

        async function callGemini(action) {
            const context = activeTab === 'simple' ? document.getElementById('projectInput').value : `Proyecto: ${document.getElementById('f_nombre').value}. Sector: ${document.getElementById('f_sector').value}.`;
            if (!context || context.length < 5) return alert("Describe tu idea primero.");

            document.getElementById('initialState').classList.add('hidden');
            document.getElementById('resultContent').classList.add('hidden');
            document.getElementById('loadingState').classList.remove('hidden');
            document.getElementById('outputHeader').classList.add('hidden');

            const prompts = {
                detailed: "Genera una ruta académica de los 5 estudios para: ",
                pestel: "Análisis PESTEL detallado para: ",
                porter: "Análisis de Porter para: ",
                risks: "Análisis Pre-Mortem y riesgos para: ",
                pitch: "Pitch de inversión para: "
            };

            try {
                const response = await fetch(ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompts[action] + context }] }] })
                });
                const data = await response.json();
                const textOutput = data.candidates[0].content.parts[0].text;

                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('outputHeader').classList.replace('hidden', 'flex');
                const res = document.getElementById('resultContent');
                res.classList.remove('hidden');
                res.innerHTML = marked.parse(textOutput);
                document.getElementById('outputTitle').innerText = action.toUpperCase();
            } catch (e) { alert("Error"); }
        }

        function downloadPDF() {
            const element = document.getElementById('resultContent');
            const title = document.getElementById('outputTitle').innerText;
            const opt = {
                margin: 1,
                filename: `Analisis_${title}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }

        function copyToClipboard() {
            const text = document.getElementById('resultContent').innerText;
            navigator.clipboard.writeText(text).then(() => alert("Copiado"));
        }
    </script>
</body>
</html>
